name: validate-plugin

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate Codex installer idempotence
        run: |
          export HOME="$RUNNER_TEMP/home"
          ./scripts/install-codex-plugin.sh
          cp "$HOME/.agents/plugins/marketplace.json" "$RUNNER_TEMP/first.json"
          ./scripts/install-codex-plugin.sh
          diff -u "$RUNNER_TEMP/first.json" "$HOME/.agents/plugins/marketplace.json"
