interface:
  display_name: "Deliver"
  short_description: "Draft, refine, then execute"
  default_prompt: "Use $deliver to create or update one readable draft checklist plan. Keep the same plan current while we talk through changes. When I say refine it, refine the same checklist into a reviewed execution plan and get approval before execution starts. Add --pro-analysis when the plan should get ChatGPT Pro pressure before refinement."
