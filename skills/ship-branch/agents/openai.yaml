interface:
  display_name: "Ship Branch"
  short_description: "Push, PR, merge, clean branch"
  default_prompt: "Use $ship-branch to finish the current feature branch. If there are dirty changes, summarize them first and ask whether to commit or stash, prefer the repo's explicit local merge gate when present, then push, create or use a PR, wait for pending or queued required checks, fix actionable check failures with focused commits, merge it, delete remote/local branches, and return to the base branch."
